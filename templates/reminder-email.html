<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Le grand jour approche</title>
</head>
<body style="margin:0;padding:0;background-color:#0A0A0A;font-family:Georgia,'Playfair Display',serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0A0A0A;padding:32px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="background-color:#111111;border:1px solid #2A2A2A;border-radius:12px;overflow:hidden;">
          <tr>
            <td align="center" style="padding:32px 24px 8px 24px;">
              <div style="color:#C9A84C;font-size:36px;letter-spacing:2px;">JM</div>
              <div style="color:#F5F5F5;font-family:Georgia,serif;font-style:italic;font-size:15px;">Joelson &amp; Marjorie</div>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:16px 24px 32px 24px;">
              <div style="color:#FFD700;font-size:20px;font-weight:bold;">Embarquement imminent ✦</div>
              <p style="color:#F5F5F5;font-size:15px;line-height:1.6;font-family:Arial,sans-serif;">
                Bonjour {{fullName}},<br/>
                Plus que quelques jours avant notre mariage, le <strong>{{dateLabel}}</strong> à {{location}}.
                Votre place est prête à la {{tableName}}, place #{{seatNumber}}. À très bientôt !
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
